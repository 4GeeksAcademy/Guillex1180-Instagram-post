<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil estilo Instagram</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <article class="profile-page">
    <header class="profile-header">
      <figure class="profile-avatar">
        <img
          src="https://picsum.photos/id/1027/300/300"
          alt="Foto de perfil"
        />
      </figure>

      <section class="profile-main" aria-label="Información principal del perfil">
        <div class="profile-topline">
          <h1 class="username">Guillex1180</h1>

          <button class="menu-icon" aria-label="Más opciones" type="button">
            <i class="fa-solid fa-ellipsis"></i>
          </button>
        </div>

        <p class="full-name">Luis Jimenez Gonzalez</p>

        <div class="stats" aria-label="Estadísticas del perfil">
          <span>
            <strong>1129</strong>
            <span class="stat-label">publicaciones</span>
          </span>

          <span>
            <strong>11.9 mil</strong>
            <span class="stat-label">seguidores</span>
          </span>

          <span>
            <strong>1</strong>
            <span class="stat-label">seguidos</span>
          </span>
        </div>

        <section class="bio" aria-label="Biografía">
          <p class="bio-emphasis">VIAJES Y COMIDA</p>
          <p>CDMX 🌎 | VENEZUELA</p>
          <p>
            <a class="profile-link" href="#">
              tiktok.com/@Perroerancho
            </a>
          </p>
        </section>

        <section class="common-followers" aria-label="Seguidores en común">
          <div class="common-avatars">
            <img
              src="https://picsum.photos/id/1011/60/60"
              alt="Avatar de seguidor 1"
            />
            <img
              src="https://picsum.photos/id/1005/60/60"
              alt="Avatar de seguidor 2"
            />
            <img
              src="https://picsum.photos/id/1025/60/60"
              alt="Avatar de seguidor 3"
            />
          </div>

          <p>Te siguen CR7, Anatoro2904 y 99 más</p>
        </section>

        <section class="action-buttons" aria-label="Acciones del perfil">
          <button class="following" type="button">
            Siguiendo
            <i class="fa-solid fa-angle-down"></i>
          </button>

          <button class="message" type="button">
            Mensaje
          </button>

          <button
            class="add-user"
            type="button"
            aria-label="Agregar usuario"
          >
            <i class="fa-solid fa-user-plus"></i>
          </button>
        </section>
      </section>
    </header>

    <section class="highlights" aria-label="Historias destacadas">
      <div class="highlights-track">

        <article class="highlight-item">
          <figure>
            <img
              src="https://picsum.photos/id/1018/120/120"
              alt="Canadá"
            />
            <figcaption>Canadá ☀️</figcaption>
          </figure>
        </article>

        <article class="highlight-item">
          <figure>
            <img
              src="https://picsum.photos/id/1015/120/120"
              alt="Playa"
            />
            <figcaption>Playa del Ca...</figcaption>
          </figure>
        </article>

        <article class="highlight-item">
          <figure>
            <img
              src="https://picsum.photos/id/1003/120/120"
              alt="Los Cabos"
            />
            <figcaption>Los Cabos</figcaption>
          </figure>
        </article>

        <article class="highlight-item">
          <figure>
            <img
              src="https://picsum.photos/id/1036/120/120"
              alt="Guadalajara"
            />
            <figcaption>Guadalajara</figcaption>
          </figure>
        </article>

        <article class="highlight-item">
          <figure>
            <img
              src="https://picsum.photos/id/1020/120/120"
              alt="Venezuela"
            />
            <figcaption>Venezuela</figcaption>
          </figure>
        </article>

        <article class="highlight-item">
          <figure>
            <img
              src="https://picsum.photos/id/1016/120/120"
              alt="Canadá 2"
            />
            <figcaption>Canadá</figcaption>
          </figure>
        </article>

        <article class="highlight-item">
          <figure>
            <img
              src="https://picsum.photos/id/1062/120/120"
              alt="Mascotas"
            />
            <figcaption>Mis Mascota...</figcaption>
          </figure>
        </article>

      </div>
    </section>

    <nav class="bottom-nav" aria-label="Navegación inferior">
      <a href="#" aria-label="Publicaciones">
        <i class="fa-solid fa-table-cells"></i>
      </a>

      <a href="#" aria-label="Reels">
        <i class="fa-solid fa-film"></i>
      </a>

      <a href="#" aria-label="Repost">
        <i class="fa-solid fa-repeat"></i>
      </a>

      <a href="#" aria-label="Etiquetado">
        <i class="fa-regular fa-user"></i>
      </a>
    </nav>
  </article>
</body>
</html>
